services:
  dani-boy-app:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - /srv/dani-boy/env/app.env
    environment:
      PORT: "8001"
    expose:
      - "8001"
    networks:
      prodoc_net:
        aliases:
          - dani-boy
          - dani-boy-app

networks:
  prodoc_net:
    external: true
    name: unesco-ed37_prodoc_net
