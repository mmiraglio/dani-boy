services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: dani-boy:latest
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      APP_ACCESS_CODE: ${APP_ACCESS_CODE:-1510T}
      SESSION_SECRET: ${SESSION_SECRET}
      PORT: ${PORT:-3000}
      APP_ORIGIN: ${APP_ORIGIN:-}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${PORT:-3000}/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
